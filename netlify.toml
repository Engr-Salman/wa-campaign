[build]
  # gen-redirects writes frontend/public/_redirects before Vite bundles the app.
  # Set BACKEND_URL in Netlify (Site settings → Environment variables) to the
  # public URL of your backend (e.g. https://wa-backend.up.railway.app).
  command = "node scripts/gen-redirects.js && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "22"

# ── How to connect this frontend to your backend ───────────────────────────────
#
# 1. Deploy your backend (Express + whatsapp-web.js) on Railway, Render, Fly.io,
#    or any host that supports long-running Node processes.
#
# 2. In the Netlify UI → Site settings → Environment variables, add:
#
#      BACKEND_URL      = https://your-backend.up.railway.app
#      VITE_SOCKET_URL  = https://your-backend.up.railway.app
#
#    • BACKEND_URL is used at DEPLOY TIME by gen-redirects.js to write the
#      _redirects proxy rule.  All /api/* calls are forwarded server-side —
#      no CORS needed and no VITE_API_BASE_URL required.
#    • VITE_SOCKET_URL is baked into the JS bundle so Socket.IO can connect
#      directly to the backend (Netlify cannot proxy WebSocket upgrades).
#
# 3. On your backend set:
#      FRONTEND_URL = https://bulkwasender.netlify.app
#    (only needed for the Socket.IO CORS check — HTTP API calls arrive from
#     Netlify's own servers so they have no browser Origin header)
#
# 4. Leave VITE_API_BASE_URL empty / unset.  If you set it to the Netlify
#    domain by mistake the app will show a clear configuration error.
#
# ──────────────────────────────────────────────────────────────────────────────

# Note: _redirects is generated by gen-redirects.js and placed in
# frontend/public/ before the build, so Vite copies it into dist/.
# The SPA catch-all and optional /api proxy are both written there.
# No static [[redirects]] block is needed here.
