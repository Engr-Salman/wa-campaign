version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bulkmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bulkmail
      POSTGRES_PASSWORD: bulkmail
      POSTGRES_DB: bulkmail
    ports:
      - "5432:5432"
    volumes:
      - bulkmail_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulkmail -d bulkmail"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bulkmail-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - bulkmail_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local dev SMTP capture (optional).
  # Open http://localhost:8025 to inspect captured mail.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bulkmail-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  bulkmail_pgdata:
  bulkmail_redisdata:
